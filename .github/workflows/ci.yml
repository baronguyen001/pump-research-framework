name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python-version: ["3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Ruff format
        run: ruff format --check .
      - name: Ruff lint
        run: ruff check .
      - name: Mypy
        run: mypy src/pumpscore
      - name: Tests
        run: pytest --cov=pumpscore --cov-fail-under=75
      - name: Register notebook kernel
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        run: python -m ipykernel install --user --name python3
      - name: Notebook smoke
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.11'
        run: papermill examples/walkthrough.ipynb walkthrough_out.ipynb
